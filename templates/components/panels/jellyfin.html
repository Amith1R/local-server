<div class="panel embed" id="panel-jellyfin">
    <div class="embed-tb">
        <span class="embed-title">Jellyfin</span>
        <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap">
            <span class="sbadge" id="jf-embed-badge">checking...</span>
            <button class="btn g" onclick="act('start_jellyfin').then(()=>setTimeout(()=>loadEmbed('jf'),2500))">Start</button>
            <button class="btn r" onclick="act('stop_jellyfin')">Stop</button>
            <a class="btn or" id="jf-win" href="#" target="_blank" rel="noopener">New window</a>
            <button class="btn gh" onclick="reloadEmbed('jf-frame')">Reload</button>
        </div>
    </div>
    <iframe id="jf-frame" class="embed-frame" src="about:blank" allowfullscreen></iframe>
    <div class="embed-offline" id="jf-offline">
        <div class="embed-offline-icon">[ ]</div>
        <div class="embed-offline-title">Jellyfin not running</div>
        <div class="embed-offline-sub">Click Start above to launch Jellyfin.</div>
    </div>
</div>
