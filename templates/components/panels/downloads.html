<div class="panel" id="panel-downloads">
    <div class="dl-form">
        <div class="ch" style="margin-bottom:.8rem">
            <div class="ch-l">
                <div class="ch-icon y">DL</div>
                <div class="ch-title">New Download</div>
            </div>
            <button class="btn gh" style="font-size:.6rem" onclick="checkTools()">Check tools</button>
        </div>
        <label class="dl-label">URL(s) - one per line</label>
        <textarea class="dl-ta" id="dl-urls" placeholder="https://example.com/file.mp4&#10;https://youtube.com/watch?v=...&#10;magnet:?xt=urn:btih:..."></textarea>
        <div class="dl-row">
            <div style="display:flex;flex-direction:column;gap:.35rem;flex:1;min-width:200px">
                <label class="dl-label" style="margin-bottom:0">Destination</label>
                <div style="display:flex;gap:.4rem">
                    <select class="dl-sel" id="dl-dest-sel" onchange="onDestSel(this)" style="flex:1">
                        <option value="">Loading...</option>
                    </select>
                    <button class="btn gh" onclick="openPathBrowser()">Browse</button>
                </div>
                <input class="dl-inp" id="dl-custom" placeholder="Custom path: /mnt/exstore/..." oninput="onCustomDest(this)">
                <div class="dl-path-show" id="dl-path-show"></div>
            </div>
            <div style="display:flex;flex-direction:column;gap:.35rem">
                <label class="dl-label" style="margin-bottom:0">Method</label>
                <select class="dl-sel" id="dl-method">
                    <option value="auto">Auto (yt-dlp / aria2c / wget)</option>
                    <option value="ytdlp">yt-dlp only</option>
                    <option value="direct">Direct (aria2c / wget / curl)</option>
                    <option value="aria2c">aria2c only</option>
                    <option value="wget">wget only</option>
                    <option value="curl">curl only</option>
                </select>
            </div>
        </div>
        <div class="btn-row" style="margin-top:.85rem">
            <button class="btn g" onclick="startDownload()">Start Download</button>
            <button class="btn gh" onclick="$('dl-urls').value=''">Clear</button>
        </div>
        <div id="tools-out" style="display:none;margin-top:.8rem;padding:.65rem .85rem;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;font-size:.68rem;line-height:1.85"></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem">
        <div style="display:flex;align-items:center;gap:.5rem">
            <div class="ch-icon b">Q</div>
            <span style="font-size:.75rem;font-weight:600">Queue</span>
        </div>
        <div style="display:flex;gap:.35rem">
            <button class="btn gh" onclick="refreshJobs()" style="font-size:.62rem">Refresh</button>
            <button class="btn gh" onclick="clearDoneJobs()" style="font-size:.62rem">Clear done</button>
        </div>
    </div>
    <div id="jobs-list"><div style="font-size:.74rem;color:var(--tx2);text-align:center;padding:2.5rem">No downloads yet</div></div>
</div>
