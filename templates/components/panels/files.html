<div class="panel embed" id="panel-files">
    <div class="embed-tb">
        <span class="embed-title">File Manager (FileBrowser)</span>
        <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap">
            <span class="sbadge" id="fb-badge">checking...</span>
            <button class="btn g" onclick="act('start_filebrowser').then(()=>setTimeout(()=>loadEmbed('fb'),2500))">Start</button>
            <button class="btn r" onclick="act('stop_filebrowser')">Stop</button>
            <a class="btn pk" id="fb-win" href="#" target="_blank" rel="noopener">New window</a>
            <button class="btn gh" onclick="reloadEmbed('fb-frame')">Reload</button>
        </div>
    </div>
    <iframe id="fb-frame" class="embed-frame" src="about:blank" allowfullscreen></iframe>
    <div class="embed-offline" id="fb-offline">
        <div class="embed-offline-icon">[ ]</div>
        <div class="embed-offline-title">FileBrowser not running</div>
        <div class="embed-offline-sub">Click Start above to launch FileBrowser.</div>
    </div>
</div>
