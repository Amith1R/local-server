<div id="rename-modal">
    <div class="rbox">
        <h3>Rename</h3>
        <div class="rbox-old" id="rename-old"></div>
        <input class="r-input" type="text" id="rename-inp" placeholder="New name" autocomplete="off" spellcheck="false">
        <div class="r-btns">
            <button class="btn gh" onclick="closeRename()">Cancel</button>
            <button class="btn g" onclick="doRename()">Rename</button>
        </div>
    </div>
</div>
